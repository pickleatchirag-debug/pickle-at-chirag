<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chirag Sports Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap');
        body { font-family: 'Montserrat', sans-serif; background-color: #0b111e; }
        /* Smooth transition when toggling layouts */
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="text-slate-200 min-h-screen p-4 md:p-8">

    <div id="authGatewayBlock" class="hidden max-w-md mx-auto mt-16 p-6 bg-slate-900 border border-slate-800 rounded-2xl shadow-2xl fade-in">
        <div class="text-center mb-6">
            <h2 class="text-xl font-extrabold text-white tracking-tight">Resident Portal Login</h2>
            <p class="text-xs text-slate-400 mt-1">Chirag Pickleball & Badminton Platform</p>
        </div>
        <form onsubmit="handlePortalLogin(event)" class="space-y-4">
            <div>
                <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1">Google Email Address</label>
                <input type="email" id="authEmailInput" required placeholder="name@gmail.com" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-2.5 text-sm text-slate-200 focus:outline-none focus:border-orange-500">
            </div>
            <div>
                <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1">Password Key</label>
                <input type="password" id="authPasswordInput" required placeholder="••••••••" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-2.5 text-sm text-slate-200 focus:outline-none focus:border-orange-500">
            </div>
            <button type="submit" class="w-full bg-gradient-to-r from-orange-500 to-amber-500 text-slate-950 font-extrabold py-3 rounded-xl hover:from-orange-400 transition-all text-xs uppercase tracking-wider">Sign Into Portal</button>
        </form>
    </div>

    <div id="mainPortalWorkspace" class="hidden max-w-4xl mx-auto space-y-6 fade-in">
        
        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 shadow-xl">
            <div>
                <h1 class="text-2xl font-extrabold text-white tracking-tight" id="welcomeHeading">Chirag Sports Portal</h1>
                <p class="text-xs text-slate-400 mt-1">
                    Manage active court bookings seamlessly. 
                    <a href="#" onclick="executeLogoutSequence()" class="text-red-400 hover:underline font-bold ml-2 text-[11px] uppercase tracking-wider">Disconnect</a>
                </p>
            </div>
            <div class="bg-slate-950 border border-slate-800 px-4 py-2 rounded-xl flex items-center gap-3">
                <div class="text-right">
                    <p class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">Available Tokens</p>
                    <p class="text-lg font-extrabold text-amber-400" id="tokenBalanceDisplay">--</p>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <div class="md:col-span-2 space-y-6">
                
                <div class="bg-slate-900 border border-slate-800 rounded-2xl p-5 shadow-lg">
                    <div class="flex items-center gap-2 mb-3">
                        <span class="w-5 h-5 rounded-full bg-orange-500/10 text-orange-400 border border-orange-500/20 text-xs font-bold flex items-center justify-center">1</span>
                        <h3 class="text-xs font-bold uppercase tracking-wider text-slate-400">Select Date</h3>
                    </div>
                    <div class="grid grid-cols-3 gap-3" id="calendarDateStrip">
                        </div>
                </div>

                <div class="bg-slate-900 border border-slate-800 rounded-2xl p-5 shadow-lg">
                    <div class="flex items-center gap-2 mb-3">
                        <span class="w-5 h-5 rounded-full bg-orange-500/10 text-orange-400 border border-orange-500/20 text-xs font-bold flex items-center justify-center">2</span>
                        <h3 class="text-xs font-bold uppercase tracking-wider text-slate-400">Select The Court</h3>
                    </div>
                    <div class="bg-slate-950 p-1 rounded-xl border border-slate-800 flex" id="assetSelectors">
                        <button onclick="changeActiveAssetSelection('PB Court 1')" id="assetBtn_PBCourt1" class="flex-1 py-2.5 text-xs font-bold rounded-lg transition-all">PB Court 1</button>
                        <button onclick="changeActiveAssetSelection('PB Court 2')" id="assetBtn_PBCourt2" class="flex-1 py-2.5 text-xs font-bold rounded-lg transition-all">PB Court 2</button>
                        <button onclick="changeActiveAssetSelection('BD Court 1')" id="assetBtn_BDCourt1" class="flex-1 py-2.5 text-xs font-bold rounded-lg transition-all">BD Court 1</button>
                    </div>
                </div>

                <div class="bg-slate-900 border border-slate-800 rounded-2xl p-5 shadow-lg">
                    <div class="flex justify-between items-center mb-3">
                        <div class="flex items-center gap-2">
                            <span class="w-5 h-5 rounded-full bg-orange-500/10 text-orange-400 border border-orange-500/20 text-xs font-bold flex items-center justify-center">3</span>
                            <h3 class="text-xs font-bold uppercase tracking-wider text-slate-400">Select Booking Time Frame</h3>
                        </div>
                        <span class="text-[10px] font-bold bg-slate-950 border border-slate-800 text-orange-400 px-2.5 py-1 rounded-md uppercase tracking-wider" id="activeAssetTagView">--</span>
                    </div>

                    <div class="grid grid-cols-2 gap-3 max-h-[300px] overflow-y-auto pr-1" id="timingGridMatrixDeck">
                        </div>

                    <div class="mt-5 pt-4 border-t border-slate-800/60">
                        <button onclick="executeBookingLockPipeline()" class="w-full bg-gradient-to-r from-orange-500 to-amber-500 text-slate-950 font-extrabold py-3.5 px-6 rounded-xl hover:from-orange-400 hover:to-amber-400 transition-all text-xs uppercase tracking-wider shadow-lg">
                            🔒 Lock Booking Reservation Frame
                        </button>
                    </div>
                </div>

            </div>

            <div class="space-y-6">
                <div class="bg-slate-900 border border-slate-800 rounded-2xl p-5 shadow-lg h-[280px] flex flex-col">
                    <div class="flex justify-between items-center mb-3 pb-2 border-b border-slate-800">
                        <h3 class="text-xs font-bold uppercase tracking-wider text-slate-400">Your Booking Ledger</h3>
                        <div class="flex gap-2 text-[9px] font-bold">
                            <button id="tabUpcoming" onclick="toggleLedgerFilter(true)" class="text-orange-400 border-b border-orange-400">Upcoming</button>
                            <button id="tabHistory" onclick="toggleLedgerFilter(false)" class="text-slate-500">History</button>
                        </div>
                    </div>
                    <div class="flex-1 overflow-y-auto space-y-2 text-xs text-slate-500 custom-scrollbar" id="userPersonalLedgerLayout">
                        </div>
                </div>

                <div class="bg-slate-900 border border-slate-800 rounded-2xl p-5 shadow-lg h-[280px] flex flex-col">
                    <h3 class="text-xs font-bold uppercase tracking-wider text-slate-400 mb-3 pb-2 border-b border-slate-800">Live Club Schedule Matrix</h3>
                    <div class="flex-1 overflow-y-auto space-y-2 text-xs text-slate-500 custom-scrollbar" id="globalClubScheduleLayout">
                        </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // Dynamic user profile storage context (Populated cleanly upon authorization handshake)
        let activeSessionUserContext = null;

        let serverDatabaseCacheSnapshot = { users: [], bookings: [] };
        let activeSelectedChronoDate = "";
        let activeSelectedAsset = "PB Court 1";
        let activeSelectedTimeSlot = "";
        let showUpcomingLedgerOnly = true;

        // 🔄 1. MASTER INITIALIZATION SESSION VALIDATION HANDSHAKE
        function verifyPortalIdentitySession() {
            fetch('/api/check-session')
                .then(res => {
                    if (!res.ok) throw new Error("Unauthorized proxy block.");
                    return res.json();
                })
                .then(data => {
                    if (data && data.user) {
                        activeSessionUserContext = data.user;
                        displayWorkspaceDashboardUI();
                    }
                })
                .catch(() => {
                    document.getElementById('mainPortalWorkspace').classList.add('hidden');
                    document.getElementById('authGatewayBlock').classList.remove('hidden');
                });
        }

        function handlePortalLogin(event) {
            event.preventDefault();
            const email = document.getElementById('authEmailInput').value.trim();
            const password = document.getElementById('authPasswordInput').value;

            fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'success') {
                    activeSessionUserContext = data.user;
                    displayWorkspaceDashboardUI();
                } else {
                    alert(data.message || "Invalid credentials.");
                }
            })
            .catch(() => alert("Failed to communicate with authentication gateway engine."));
        }

        function executeLogoutSequence() {
            fetch('/api/logout', { method: 'POST' })
                .then(() => { window.location.reload(); });
        }

        function displayWorkspaceDashboardUI() {
            document.getElementById('authGatewayBlock').classList.add('hidden');
            document.getElementById('mainPortalWorkspace').classList.remove('hidden');
            document.getElementById('welcomeHeading').innerText = `Welcome, ${activeSessionUserContext.fullName}`;
            
            buildCalendarTabs();
            changeActiveAssetSelection('PB Court 1');
            syncPortalDatabaseState();
            
            // Background pooling configurations loops 
            setInterval(syncPortalDatabaseState, 7000);
        }

        // 📊 2. READ DATABASE OPERATIONS DATA STREAM
        function syncPortalDatabaseState() {
            fetch('/api/admin-fetch-dashboard-snapshot')
                .then(res => res.json())
                .then(snapshot => {
                    serverDatabaseCacheSnapshot = snapshot;
                    
                    // Direct dynamic token updates mapping
                    const selfProfile = snapshot.users.find(u => u.google_email.toLowerCase() === activeSessionUserContext.email.toLowerCase());
                    if(selfProfile) {
                        activeSessionUserContext.tokensBalance = selfProfile.available_tokens;
                        document.getElementById('tokenBalanceDisplay').innerText = selfProfile.available_tokens;
                    }

                    renderTimelineMatrixCells();
                    renderLedgerDisplays();
                })
                .catch(err => console.log("Data packet sync heartbeat error."));
        }

        // 📅 3. SYSTEM CLOCK DATE STRIP SELECTOR SYNCHRONIZATION
        function buildCalendarTabs() {
            const container = document.getElementById('calendarDateStrip');
            container.innerHTML = "";
            const today = new Date();

            for(let i=0; i<3; i++) {
                const target = new Date();
                target.setDate(today.getDate() + i);

                const yyyy = target.getFullYear();
                const mm = String(target.getMonth() + 1).padStart(2, '0');
                const dd = String(target.getDate()).padStart(2, '0');
                const trackingDateString = `${yyyy}-${mm}-${dd}`;

                if(i === 0) activeSelectedChronoDate = trackingDateString;

                const btn = document.createElement('button');
                btn.id = `cal_${trackingDateString}`;
                btn.onclick = () => {
                    activeSelectedChronoDate = trackingDateString;
                    activeSelectedTimeSlot = "";
                    updateCalendarStripVisualSelection();
                    renderTimelineMatrixCells();
                };
                btn.className = "bg-slate-950 p-3 rounded-xl border border-slate-800 text-center transition-all cursor-pointer";
                btn.innerHTML = `
                    <p class="text-[10px] font-bold text-slate-500 uppercase">${target.toLocaleDateString('en-US', {weekday: 'short'})}</p>
                    <p class="text-lg font-extrabold text-slate-200 mt-0.5">${target.getDate()}</p>
                `;
                container.appendChild(btn);
            }
            updateCalendarStripVisualSelection();
        }

        function updateCalendarStripVisualSelection() {
            const children = document.getElementById('calendarDateStrip').children;
            for(let el of children) {
                el.className = "bg-slate-950 p-3 rounded-xl border border-slate-800 text-center transition-all cursor-pointer";
            }
            const targetActive = document.getElementById(`cal_${activeSelectedChronoDate}`);
            if(targetActive) {
                targetActive.className = "bg-slate-900 border-2 border-orange-500 p-3 rounded-xl text-center shadow-md";
            }
        }

        function changeActiveAssetSelection(asset) {
            activeSelectedAsset = asset;
            activeSelectedTimeSlot = "";
            document.getElementById('activeAssetTagView').innerText = asset.toUpperCase();

            const buttons = document.getElementById('assetSelectors').children;
            for(let btn of buttons) {
                btn.className = "flex-1 py-2.5 text-xs font-bold rounded-lg transition-all text-slate-400 hover:text-slate-200";
            }
            const activeBtn = document.getElementById(`assetBtn_${asset.replace(/\s+/g, '')}`);
            if(activeBtn) {
                activeBtn.className = "flex-1 py-2.5 text-xs font-extrabold rounded-lg transition-all bg-slate-800 text-orange-400 border border-slate-700 shadow";
            }
            renderTimelineMatrixCells();
        }

        function isCourtMatch(loggedName, selectedName) {
            if (!loggedName || !selectedName) return false;
            let n1 = loggedName.toLowerCase().replace(/[^a-z0-9]/g, '');
            let n2 = selectedName.toLowerCase().replace(/[^a-z0-9]/g, '');
            if (n1.startsWith('pb')) n1 = n1.replace('pb', 'pickleball');
            if (n2.startsWith('pb')) n2 = n2.replace('pb', 'pickleball');
            if (n1.startsWith('bd')) n1 = n1.replace('bd', 'badminton');
            if (n2.startsWith('bd')) n2 = n2.replace('bd', 'badminton');
            if (n1 === "pickleballcourt") n1 = "pickleballcourt1";
            if (n2 === "pickleballcourt") n2 = "pickleballcourt1";
            return n1 === n2;
        }

        // 🔒 4. TIMELINE TIME CELL GENERATION & HISTORIC AUTO-LOCK LOCKOUTS
        function renderTimelineMatrixCells() {
            const deck = document.getElementById('timingGridMatrixDeck');
            deck.innerHTML = "";

            const operationsSlots = [
                "06:00 - 07:00", "07:00 - 08:00", "08:00 - 09:00", "09:00 - 10:00",
                "10:00 - 11:00", "11:00 - 12:00", "12:00 - 13:00", "13:00 - 14:00",
                "14:00 - 15:00", "15:00 - 16:00", "16:00 - 17:00", "17:00 - 18:00",
                "18:00 - 19:00", "19:00 - 20:00", "20:00 - 21:00", "21:00 - 22:00"
            ];

            const now = new Date();
            const todayStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
            const currentHour = now.getHours();

            operationsSlots.forEach(slot => {
                // Parse out start hour limit thresholds
                const startHour = parseInt(slot.split(':')[0]);
                const isPastTimeSlot = (activeSelectedChronoDate === todayStr && startHour <= currentHour);

                const checkReserved = serverDatabaseCacheSnapshot.bookings.find(b => {
                    const dateClean = String(b.date).split('T')[0].trim();
                    return dateClean === activeSelectedChronoDate && 
                           isCourtMatch(b.court_name, activeSelectedAsset) && 
                           String(b.time_slot).trim() === slot;
                });

                const cell = document.createElement('button');
                cell.className = "w-full border p-3 rounded-xl flex flex-col items-center justify-center transition-all text-center";

                if (checkReserved) {
                    // Absolute isolation permission enforcement gates
                    const selfOwned = checkReserved.booked_by.toLowerCase().trim() === activeSessionUserContext.fullName.toLowerCase().trim();
                    cell.className = selfOwned
                        ? "w-full bg-emerald-950/30 border-emerald-500/30 p-3 rounded-xl flex flex-col items-center justify-center text-center shadow-inner"
                        : "w-full bg-slate-950 border-slate-900 p-3 rounded-xl flex flex-col items-center justify-center text-center opacity-30 cursor-not-allowed";
                    
                    cell.innerHTML = `
                        <span class="text-xs font-bold text-slate-300">${slot}</span>
                        <span class="text-[9px] uppercase font-bold mt-0.5 ${selfOwned ? 'text-emerald-400':'text-slate-600'}">${selfOwned ? 'Your Match' : 'Occupied'}</span>
                    `;
                    if(!selfOwned) cell.disabled = true;
                } else if (isPastTimeSlot) {
                    // Historic calendar hour lock parameters triggers
                    cell.className = "w-full bg-slate-950/20 border-slate-900/40 p-3 rounded-xl flex flex-col items-center justify-center text-center opacity-20 cursor-not-allowed";
                    cell.innerHTML = `
                        <span class="text-xs font-bold text-slate-600 line-through">${slot}</span>
                        <span class="text-[9px] uppercase font-bold mt-0.5 text-slate-700">Expired</span>
                    `;
                    cell.disabled = true;
                } else {
                    const activeSelect = activeSelectedTimeSlot === slot;
                    cell.className = activeSelect
                        ? "w-full bg-slate-950 border-2 border-amber-500 p-3 rounded-xl flex flex-col items-center justify-center text-center shadow transform scale-[1.01]"
                        : "w-full bg-slate-950/40 border-slate-800 hover:border-slate-700 p-3 rounded-xl flex flex-col items-center justify-center text-center cursor-pointer";
                    
                    cell.onclick = () => {
                        activeSelectedTimeSlot = activeSelectedTimeSlot === slot ? "" : slot;
                        renderTimelineMatrixCells();
                    };
                    cell.innerHTML = `
                        <span class="text-xs font-bold ${activeSelect ? 'text-amber-400':'text-slate-400'}">${slot}</span>
                        <span class="text-[9px] uppercase font-bold mt-0.5 ${activeSelect ? 'text-amber-500':'text-slate-600'}">${activeSelect ? 'Selected Cell':'Available Slot'}</span>
                    `;
                }
                deck.appendChild(cell);
            });
        }

        // 🔒 5. POST TRANSACTION OPERATION EXECUTION PATHS
        function executeBookingLockPipeline() {
            if(!activeSelectedTimeSlot) {
                alert("Please tap to select an available timeline cell frame first.");
                return;
            }
            if(parseInt(activeSessionUserContext.tokensBalance) <= 0) {
                alert("Transaction Blocked: Your active structural token ledger pool has reached zero.");
                return;
            }

            const submissionPayload = {
                courtName: activeSelectedAsset,
                sportType: activeSelectedAsset.startsWith('BD') ? "BADMINTON" : "PICKLEBALL",
                userName: activeSessionUserContext.fullName,
                date: activeSelectedChronoDate,
                timeSlot: activeSelectedTimeSlot
            };

            fetch('/api/admin-post-action-dispatch', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: "secureBooking", ...submissionPayload })
            })
            .then(res => res.json())
            .then(data => {
                if(data.status === 'success') {
                    alert("✓ Reservation Frame locked cleanly!");
                    activeSelectedTimeSlot = "";
                    syncPortalDatabaseState();
                } else {
                    alert(data.message || "Execution tracking rejected.");
                }
            })
            .catch(() => alert("Operational pipeline timeout. Direct row entry dropped."));
        }

        function executeReleasePipeline(bookingId) {
            if(!confirm("Are you sure you want to release this reservation frame?")) return;

            fetch('/api/admin-post-action-dispatch', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: "removeBooking", bookingId: bookingId })
            })
            .then(res => res.json())
            .then(data => {
                if(data.status === 'success') {
                    alert("✓ Booking released cleanly.");
                    syncPortalDatabaseState();
                }
            })
            .catch(() => alert("Failed to transmit structural row update."));
        }

        function toggleLedgerFilter(showUpcoming) {
            showUpcomingLedgerOnly = showUpcoming;
            document.getElementById('tabUpcoming').className = showUpcoming ? "text-orange-400 border-b border-orange-400" : "text-slate-500";
            document.getElementById('tabHistory').className = !showUpcoming ? "text-orange-400 border-b border-orange-400" : "text-slate-500";
            renderLedgerDisplays();
        }

        // 📑 6. CHRONO DISPATCH SORTING LEDGER & GLOBAL TERMINAL RENDERS
        function renderLedgerDisplays() {
            const pLedger = document.getElementById('userPersonalLedgerLayout');
            const gLedger = document.getElementById('globalClubScheduleLayout');

            const now = new Date();
            const todayStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
            const currentHour = now.getHours();

            // 1. Process Isolated Multi-User Personal Ledger Frame Arrays
            let personalRows = serverDatabaseCacheSnapshot.bookings.filter(b => b.booked_by.toLowerCase().trim() === activeSessionUserContext.fullName.toLowerCase().trim());
            
            // Apply strict Chrono splitting filters parameters rules
            personalRows = personalRows.filter(b => {
                const bDate = b.date.split('T')[0];
                const bHour = parseInt(b.time_slot.split(':') [0]);
                const hasPassed = (bDate < todayStr) || (bDate === todayStr && bHour <= currentHour);
                return showUpcomingLedgerOnly ? !hasPassed : hasPassed;
            });

            if(personalRows.length === 0) {
                pLedger.className = "flex-1 overflow-y-auto space-y-2 text-xs text-slate-500 flex flex-col justify-center items-center";
                pLedger.innerHTML = `<p>No matching records found.</p>`;
            } else {
                pLedger.className = "flex-1 overflow-y-auto space-y-2 w-full text-left pr-1";
                pLedger.innerHTML = "";
                personalRows.forEach(b => {
                    const row = document.createElement('div');
                    row.className = "bg-slate-950 border border-slate-800 p-2.5 rounded-xl flex justify-between items-center text-xs";
                    row.innerHTML = `
                        <div>
                            <p class="font-bold text-slate-300">${b.court_name} ➔ ${b.time_slot}</p>
                            <p class="text-[10px] text-slate-500 mt-0.5">Date: ${b.date.split('T')[0]}</p>
                        </div>
                        ${showUpcomingLedgerOnly ? `<button onclick="executeReleasePipeline('${b.booking_id}')" class="text-[10px] font-bold text-red-400 bg-red-500/5 border border-red-500/20 px-2 py-1 rounded-md uppercase">Release</button>` : ''}
                    `;
                    pLedger.appendChild(row);
                });
            }

            // 2. Process Global Live Terminal Console Feed (Filtered to Upcoming Match elements for Today)
            let globalRows = serverDatabaseCacheSnapshot.bookings.filter(b => b.date.split('T')[0] === todayStr);
            globalRows = globalRows.filter(b => parseInt(b.time_slot.split(':')[0]) > currentHour);

            if(globalRows.length === 0) {
                gLedger.className = "flex-1 overflow-y-auto space-y-2 text-xs text-slate-500 flex flex-col justify-center items-center";
                gLedger.innerHTML = `<p>No upcoming present bookings logged.</p>`;
            } else {
                gLedger.className = "flex-1 overflow-y-auto space-y-2 w-full text-left pr-1";
                gLedger.innerHTML = "";
                globalRows.forEach(b => {
                    const card = document.createElement('div');
                    card.className = "bg-slate-950/40 border border-slate-800/60 p-2.5 rounded-xl text-[11px] leading-relaxed text-slate-300 tracking-wide";
                    // 🎯 EXACT SPECIFICATION FORMAT MAPPED: [Court Name] · [Date] · [Time Slot] ➔ [Member Name]
                    card.innerHTML = `
                        <div class="flex justify-between items-center">
                            <span class="font-bold text-orange-400 text-xs">${b.court_name}</span>
                            <span class="text-[10px] text-slate-500">${b.date.split('T')[0]}</span>
                        </div>
                        <div class="flex justify-between items-center mt-1 pt-1 border-t border-slate-900">
                            <span class="text-slate-400 bg-slate-950 px-1.5 py-0.5 rounded border border-slate-800 text-[10px] font-mono">${b.time_slot}</span>
                            <span class="text-amber-400 font-bold uppercase tracking-wider">${b.booked_by}</span>
                        </div>
                    `;
                    gLedger.appendChild(card);
                });
            }
        }

        // Initialize active boot hook triggers sequences
        window.addEventListener('DOMContentLoaded', verifyPortalIdentitySession);
    </script>
</body>
</html>
