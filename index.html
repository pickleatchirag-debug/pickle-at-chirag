<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>pickle@chirag</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Ensure the scrollbar doesn't jump */
    ::-webkit-scrollbar { width: 6px; } 
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 9999px; }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans">
  <main class="p-4 max-w-xl mx-auto">
    <div id="viewLoginPanel" class="bg-slate-900 p-6 rounded-2xl border border-slate-800">
      <form id="coreLoginFormHub" onsubmit="event.preventDefault(); executeMemberLoginHandshake();" class="space-y-4">
        <input type="email" id="loginEmailField" placeholder="Email" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-sm">
        <input type="password" id="loginPasswordField" placeholder="Password" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-sm">
        <button type="submit" class="w-full bg-red-600 text-white font-black py-4 rounded-xl">Sign In</button>
      </form>
    </div>

    <div id="viewWorkspacePanel" class="hidden space-y-6">
      <div id="userTimeSlotMatrixGrid" class="grid grid-cols-2 gap-2"></div>
      <div id="userPersonalLedgerContainer" class="space-y-2"></div>
      <div id="viewGlobalClubTimeline" class="space-y-2"></div>
      <button onclick="executeLogoutSequence()" class="text-xs uppercase text-slate-500">Logout</button>
    </div>
  </main>

  <script>
    // ✅ Pointing to your proxy (server.js handles the forwarding)
    const BACKEND_WEBAPP_URL = "/api/gateway"; 
    
    // ... [Add your state variables here: matrixAvailabilityRecords, personalLedgerBookings, etc.] ...

    // IMPORTANT: When calling your API from now on, ensure the payload includes the 'action' key
    // Example for your sync function:
    function syncUserLogsAndMatrix() {
        if(!secureUserSessionToken) return;
        
        // 1. Fetch Availability (Date-specific grid)
        fetch(BACKEND_WEBAPP_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: "getAvailability", sessionToken: secureUserSessionToken, date: selectedUserDateStr })
        })
        .then(r => r.json()).then(res => {
            if(res.success) {
                matrixAvailabilityRecords = res.availability;
                renderUserMatrixGridUI();
            }
        });

        // 2. Fetch Global Timeline (All upcoming bookings)
        fetch(BACKEND_WEBAPP_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: "getUpcomingBookings", sessionToken: secureUserSessionToken })
        })
        .then(r => r.json()).then(res => {
            if(res.success) renderGlobalClubTimelineUI(res.bookings);
        });
    }

    // [Include renderUserMatrixGridUI, renderUserPersonalLedgerUI, and renderGlobalClubTimelineUI as per previous steps]
  </script>
</body>
</html>
