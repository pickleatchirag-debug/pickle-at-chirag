<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chirag Sports Portal — Member Desk</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans select-none flex flex-col justify-between pb-6">

  <div class="bg-slate-900 border-b border-slate-800 text-xs py-2 px-4 shadow-md">
    <marquee id="systemGlobalTicker" class="text-slate-300 font-medium"></marquee>
  </div>

  <main class="p-4 max-w-xl mx-auto w-full flex-1 flex flex-col justify-center">
    
    <div id="viewLoginPanel" class="bg-slate-900 p-6 rounded-2xl border border-slate-800 shadow-2xl space-y-4 max-w-md w-full mx-auto">
      <div class="text-center"><h2 class="text-xs font-black tracking-widest uppercase text-red-500">Welcome Back</h2><p class="text-xl font-black text-slate-100">Log Into Resident Portal</p></div>
      <div class="space-y-3">
        <div><label class="text-[10px] font-black uppercase text-slate-400 block">Google Email Address</label><input type="email" id="loginEmailField" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-sm focus:outline-none focus:border-red-500 font-mono text-slate-100"></div>
        <div><label class="text-[10px] font-black uppercase text-slate-400 block">Personal Password Key</label><input type="password" id="loginPasswordField" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-sm focus:outline-none focus:border-red-500 tracking-widest text-slate-100"></div>
        <button onclick="executeMemberLoginHandshake()" class="w-full bg-gradient-to-r from-red-500 to-amber-500 text-slate-950 font-black py-3.5 rounded-xl text-xs uppercase tracking-widest">Sign Into Dashboard</button>
      </div>
      <div class="flex justify-between text-xs text-slate-400"><p>New player? <button onclick="toggleInterfaceView('register')" class="text-amber-400 font-bold hover:underline">Register</button></p></div>
    </div>

    <div id="viewWorkspacePanel" class="hidden space-y-6">
      <div class="bg-slate-900 border border-slate-800 p-4 rounded-2xl flex justify-between items-center">
         <div class="flex items-center space-x-3">
            <div class="text-2xl bg-red-500/10 border border-red-500/20 p-2 rounded-xl">🏆</div>
            <div><h3 id="lblWorkspaceMemberName" class="text-sm font-black text-slate-100">--</h3><p id="lblWorkspaceMemberEmail" class="text-[10px] text-slate-400 font-mono">--</p></div>
         </div>
         <div class="text-right"><span class="text-[9px] uppercase font-black text-slate-400 block">Tokens Available</span><span id="lblWorkspaceAvailableTokens" class="text-lg font-black text-amber-400 font-mono">0</span></div>
      </div>

      <div class="bg-slate-900 border border-slate-800 p-4 rounded-2xl shadow-lg space-y-3">
         <div class="flex justify-between items-center gap-2 py-0.5" id="userCalendarStrip"></div>
         <div class="grid grid-cols-3 gap-2 bg-slate-950 p-1 rounded-xl border border-slate-900 text-xs font-bold text-center">
           <button id="userBtnC1" onclick="switchUserCourtAsset('Pickleball Court 1')" class="bg-slate-900 text-red-400 p-2 rounded-lg border border-slate-800 font-bold">PB Court 1</button>
           <button id="userBtnC2" onclick="switchUserCourtAsset('Pickleball Court 2')" class="text-slate-500 p-2 rounded-lg font-bold">PB Court 2</button>
           <button id="userBtnC3" onclick="switchUserCourtAsset('Badminton Court 1')" class="text-slate-500 p-2 rounded-lg font-bold">BD Court 1</button>
         </div>
      </div>

      <div class="bg-slate-900 border border-slate-800 p-4 rounded-2xl shadow-lg space-y-3">
         <div class="flex justify-between items-center border-b border-slate-800 pb-1.5"><span class="text-xs font-black uppercase text-slate-400">Select Time Block</span><span id="lblUserAssetHeadline" class="text-[10px] font-black uppercase text-red-400 tracking-wider">Pickleball Court 1</span></div>
         <div id="userTimeSlotMatrixGrid" class="grid grid-cols-2 gap-2.5 max-h-[260px] overflow-y-auto pr-1"></div>
         <button onclick="commitSecureMemberBooking()" class="w-full bg-gradient-to-r from-red-500 to-amber-500 text-slate-950 font-black py-4 rounded-xl text-xs uppercase tracking-widest">Lock Booking Frame</button>
      </div>

      <div class="bg-slate-900 border border-slate-800 p-4 rounded-2xl shadow-lg space-y-4">
        <h2 class="text-xs font-black tracking-wider uppercase text-slate-300 border-b border-slate-800 pb-2">Your Ledger Status</h2>
        <div id="userPersonalLedgerContainer" class="max-h-[240px] overflow-y-auto space-y-2.5 pr-1"></div>
      </div>
      
      <div class="text-center"><button onclick="executeLogoutSequence()" class="text-[10px] font-black uppercase tracking-widest text-slate-500 hover:text-red-400 transition-all border border-slate-800 px-4 py-2 rounded-xl bg-slate-900/40">✕ Log Out</button></div>
    </div>

    <div id="viewRegisterPanel" class="hidden bg-slate-900 p-6 rounded-2xl border border-slate-800 max-w-md w-full mx-auto space-y-3">
      <div class="text-center"><p class="text-xl font-black text-white">Create Member Password</p></div>
      <input type="email" id="regEmailField" placeholder="Whitelisted Email" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-sm text-slate-100 font-mono">
      <input type="text" id="regNameField" placeholder="Your Full Name" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-sm text-slate-100">
      <input type="text" id="regCodeField" placeholder="Society Unit Code" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-sm text-slate-100 font-mono">
      <input type="password" id="regPasswordField" placeholder="Set Account Password" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-sm tracking-widest text-slate-100">
      <button onclick="executeMemberAccountRegistration()" class="w-full bg-amber-500 text-slate-950 font-black py-3.5 rounded-xl text-xs uppercase tracking-widest">Complete Registration</button>
      <p class="text-xs text-slate-400 text-center">Already configured? <button onclick="toggleInterfaceView('login')" class="text-red-400 font-bold">Login here</button></p>
    </div>

  </main>

  <script>
    const TIME_SLOTS = ["07:00 - 08:00", "08:00 - 09:00", "09:00 - 10:00", "10:00 - 11:00", "11:00 - 12:00", "12:00 - 13:00", "13:00 - 14:00", "14:00 - 15:00", "15:00 - 16:00", "16:00 - 17:00", "17:00 - 18:00", "18:00 - 19:00", "19:00 - 20:00", "20:00 - 21:00"];
    let selectedUserAsset = "Pickleball Court 1", selectedUserDateStr = "", userActiveBookingsLogs = [], sessionMemberProfile = null;
    let selectedTentativeSlotMemory = "", secureUserSessionToken = "";

    function getNowLocalIST() { return new Date(new Date().toLocaleString("en-US", { timeZone: "Asia/Kolkata" })); }
    function sanitizeUIDate(input) {
        if(!input) return "";
        let str = input.toString().trim();
        if(str.includes('T')) {
            let d = new Date(str);
            if(!isNaN(d.getTime())) {
                let localIST = new Date(d.toLocaleString("en-US", { timeZone: "Asia/Kolkata" }));
                return `${String(localIST.getDate()).padStart(2,'0')}/${String(localIST.getMonth()+1).padStart(2,'0')}/${localIST.getFullYear()}`;
            }
        }
        return str;
    }

    function parseUIDateToAbsoluteObject(dateStr, timeSlotStr) {
        try {
            const [d, m, y] = dateStr.split('/');
            const [startHourStr] = timeSlotStr.split(' - ');
            const [hour, minutes] = startHourStr.split(':');
            return new Date(parseInt(y, 10), parseInt(m, 10) - 1, parseInt(d, 10), parseInt(hour, 10), parseInt(minutes || 0, 10), 0);
        } catch(e) { return new Date(); }
    }

    function extractNormalizedAssetToken(name) {
        if(!name) return "";
        let str = name.toString().toLowerCase().trim();
        let prefix = (str.includes("badminton") || str.includes("bd")) ? "bd" : "pb";
        let numbers = str.replace(/[^0-9]/g, '');
        return prefix + (numbers.length > 0 ? numbers.charAt(0) : "1");
    }

    function toggleInterfaceView(targetView) {
        document.getElementById('viewLoginPanel').classList.add('hidden');
        document.getElementById('viewRegisterPanel').classList.add('hidden');
        document.getElementById('viewWorkspacePanel').classList.add('hidden');
        if(targetView === 'login') document.getElementById('viewLoginPanel').classList.remove('hidden');
        if(targetView === 'register') document.getElementById('viewRegisterPanel').classList.remove('hidden');
        if(targetView === 'workspace') document.getElementById('viewWorkspacePanel').classList.remove('hidden');
    }

    function executeMemberLoginHandshake() {
        const email = document.getElementById('loginEmailField').value.trim();
        const password = document.getElementById('loginPasswordField').value.trim();

        fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        })
        .then(r => r.json()).then(res => {
            if(res.status === "error") return alert(res.message);
            secureUserSessionToken = res.token;
            sessionMemberProfile = res.user;

            document.getElementById('lblWorkspaceMemberName').innerText = sessionMemberProfile.full_name;
            document.getElementById('lblWorkspaceMemberEmail').innerText = sessionMemberProfile.google_email;
            document.getElementById('lblWorkspaceAvailableTokens').innerText = res.activeTokens;

            toggleInterfaceView('workspace');
            initUserCalendarStrip();
            setInterval(syncUserLogsAndMatrix, 4000); syncUserLogsAndMatrix();
        });
    }

    function executeMemberAccountRegistration() {
        const email = document.getElementById('regEmailField').value.trim();
        const fullName = document.getElementById('regNameField').value.trim();
        const registrationCode = document.getElementById('regCodeField').value.trim();
        const password = document.getElementById('regPasswordField').value.trim();

        fetch('/api/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, fullName, registrationCode, password })
        })
        .then(r => r.json()).then(res => {
            if (res.status === "success") { alert("Registration complete!"); toggleInterfaceView('login'); }
            else { alert(res.message); }
        });
    }

    function initUserCalendarStrip() {
        const box = document.getElementById('userCalendarStrip'); if(!box) return;
        const nowIST = getNowLocalIST(); box.innerHTML = "";

        for(let i=0; i<3; i++) {
           let d = new Date(nowIST.getTime()); d.setDate(nowIST.getDate() + i);
           let dStr = `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
           if(i === 0 && !selectedUserDateStr) selectedUserDateStr = dStr;
           
           let isSel = selectedUserDateStr === dStr;
           box.innerHTML += `
             <div onclick="switchUserDateAsset('${dStr}')" class="border text-center flex-1 p-2 rounded-xl cursor-pointer ${isSel?'border-red-500 bg-red-950/20 text-red-400 font-bold':'border-slate-800 bg-slate-900 text-slate-400'}">
                <p class="text-sm font-black text-slate-200">${String(d.getDate()).padStart(2,'0')}</p>
             </div>`;
        }
    }

    function switchUserDateAsset(dateStr) { selectedUserDateStr = dateStr; selectedTentativeSlotMemory = ""; initUserCalendarStrip(); syncUserLogsAndMatrix(); }
    
    function switchUserCourtAsset(courtName) {
        selectedUserAsset = courtName; selectedTentativeSlotMemory = "";
        document.getElementById('lblUserAssetHeadline').innerText = courtName;
        ['userBtnC1','userBtnC2','userBtnC3'].forEach(id => document.getElementById(id).className="text-slate-500 p-2 rounded-lg font-bold");
        const activeId = courtName.includes('1') ? (courtName.includes('Pickleball')?'userBtnC1':'userBtnC3') : 'userBtnC2';
        document.getElementById(activeId).className="bg-slate-950 text-red-400 p-2 rounded-lg border border-slate-800 font-bold";
        syncUserLogsAndMatrix();
    }

    function syncUserLogsAndMatrix() {
        fetch('/api/fetch-logs', { method:'POST' }).then(r=>r.json()).then(res => {
            userActiveBookingsLogs = res.records || [];
            renderUserMatrixGridUI();
            renderUserPersonalLedgerUI();
        });
    }

    function renderUserMatrixGridUI() {
        const grid = document.getElementById('userTimeSlotMatrixGrid'); if(!grid) return;
        const nowIST = getNowLocalIST();
        const targetToken = extractNormalizedAssetToken(selectedUserAsset);
        const activeFilteredLogs = userActiveBookingsLogs.filter(l => extractNormalizedAssetToken(l.court_name) === targetToken && sanitizeUIDate(l.date) === selectedUserDateStr);

        let newHTML = "";
        TIME_SLOTS.forEach(slot => {
            const rowMatch = activeFilteredLogs.find(l => l.time_slot.trim() === slot.trim());
            const isPast = nowIST >= parseUIDateToAbsoluteObject(selectedUserDateStr, slot);
            
            let cardStyle = "bg-slate-950 border-slate-900 text-slate-300 hover:border-slate-800 cursor-pointer";
            let stateLabel = "Available Slot"; let action = `onclick="selectTentativeUserSlot('${slot}')"`;

            if(isPast) {
                cardStyle = "bg-slate-900/10 border-slate-950 text-slate-700 line-through cursor-not-allowed";
                stateLabel = "Expired Slot"; action = "";
            } else if(rowMatch) {
                let isMine = rowMatch.booked_by === sessionMemberProfile.full_name;
                cardStyle = isMine ? "bg-red-950/20 border-red-500 text-red-400 font-bold" : "bg-slate-900 border-slate-800 text-slate-500 cursor-not-allowed";
                stateLabel = isMine ? "Your Locked Session" : "Occupied Frame";
                action = isMine ? `onclick="forceUserSelfRelease('${rowMatch.booking_id}')"` : "";
            } else if(selectedTentativeSlotMemory === slot) {
                cardStyle = "border-amber-400 bg-amber-950/10 text-amber-400 font-bold";
                stateLabel = "Selected Target Block";
            }
            newHTML += `<div ${action} class="border p-3 rounded-xl text-center select-none ${cardStyle}"><span class="text-xs font-mono font-bold block">${slot}</span><span class="text-[9px] uppercase font-black block">${stateLabel}</span></div>`;
        });
        grid.innerHTML = newHTML;
    }

    function selectTentativeUserSlot(slotStr) { selectedTentativeSlotMemory = slotStr; renderUserMatrixGridUI(); }

    function renderUserPersonalLedgerUI() {
        const container = document.getElementById('userPersonalLedgerContainer'); if(!container) return;
        container.innerHTML = "";
        let records = userActiveBookingsLogs.filter(b => b.booked_by === sessionMemberProfile.full_name);
        
        if(records.length === 0) { container.innerHTML = `<p class='text-xs text-slate-500 text-center py-4'>No bookings log records found.</p>`; return; }
        records.forEach(b => {
            container.innerHTML += `
              <div class="flex justify-between items-center bg-slate-950 p-3 rounded-xl border border-slate-900">
                <div><h4 class="font-bold text-slate-200 text-xs">${b.court_name}</h4><p class="text-[10px] text-slate-400 font-mono">${sanitizeUIDate(b.date)} | ${b.time_slot}</p></div>
                <button onclick="forceUserSelfRelease('${b.booking_id}')" class="text-[10px] bg-red-950 text-red-400 px-2 py-1 rounded">Cancel</button>
              </div>`;
        });
    }

    function forceUserSelfRelease(bookingId) {
        if (confirm("Cancel this booking?")) {
            fetch('/api/release-booking', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ bookingId }) })
            .then(r => r.json()).then(() => syncUserLogsAndMatrix());
        }
    }

    function commitSecureMemberBooking() {
        if(!selectedTentativeSlotMemory) return alert("Select an open slot card block element.");
        fetch('/api/secure-booking', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ courtName: selectedUserAsset, sportType: selectedUserAsset.includes('Pickleball')?'PICKLEBALL':'BADMINTON', userName: sessionMemberProfile.full_name, date: selectedUserDateStr, timeSlot: selectedTentativeSlotMemory })
        })
        .then(r => r.json()).then(() => { selectedTentativeSlotMemory = ""; syncUserLogsAndMatrix(); });
    }

    function executeLogoutSequence() { window.location.reload(); }
  </script>
</body>
</html>
