<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chirag Sports — Gate Access Desk</title>
  <meta name="theme-color" content="#020617">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans flex flex-col justify-between overflow-hidden relative">

  <header class="bg-slate-900 border-b border-slate-800 p-6 shadow-xl">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      <div class="flex items-center space-x-4">
        <div class="bg-cyan-500/10 border border-cyan-500/30 p-3 rounded-2xl text-2xl">🚧</div>
        <div>
          <h1 class="text-xs font-black tracking-[0.25em] uppercase text-cyan-400">Club Entrance Gate</h1>
          <h2 class="text-2xl font-black text-white tracking-tight mt-0.5">Live Schedule Matrix</h2>
        </div>
      </div>
      <div class="flex items-center space-x-6 bg-slate-950 px-5 py-3 rounded-2xl border border-slate-800/80 shadow-md">
        <div class="text-right">
          <p id="gateLiveDateStr" class="text-xs font-black uppercase text-slate-400 tracking-wider">--/--/----</p>
          <p id="gateLiveClockStr" class="text-xl font-mono font-black text-amber-400 mt-0.5">00:00:00</p>
        </div>
        <div class="h-8 w-px bg-slate-800"></div>
        <div class="flex items-center space-x-2">
          <span class="w-3 h-3 rounded-full bg-emerald-500 shadow-[0_0_12px_rgba(16,185,129,0.4)]"></span>
          <span class="text-[10px] uppercase font-black tracking-widest text-emerald-400">Sync Active</span>
        </div>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto w-full flex-1 p-6 overflow-y-auto">
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      <div class="bg-slate-900 rounded-3xl border border-slate-800 p-5 space-y-4">
        <div class="flex justify-between items-center border-b border-slate-800 pb-3">
          <h3 class="text-sm font-black uppercase tracking-wider text-slate-200">🏓 Pickleball Court 1</h3>
          <span class="text-[9px] bg-red-950/40 text-red-400 border border-red-900/40 px-2 py-0.5 rounded-lg font-black">PB-01</span>
        </div>
        <div id="matrixContainer-pb1" class="space-y-3 max-h-[620px] overflow-y-auto"></div>
      </div>

      <div class="bg-slate-900 rounded-3xl border border-slate-800 p-5 space-y-4">
        <div class="flex justify-between items-center border-b border-slate-800 pb-3">
          <h3 class="text-sm font-black uppercase tracking-wider text-slate-200">🏓 Pickleball Court 2</h3>
          <span class="text-[9px] bg-amber-950/40 text-amber-400 border border-amber-900/40 px-2 py-0.5 rounded-lg font-black">PB-02</span>
        </div>
        <div id="matrixContainer-pb2" class="space-y-3 max-h-[620px] overflow-y-auto"></div>
      </div>

      <div class="bg-slate-900 rounded-3xl border border-slate-800 p-5 space-y-4">
        <div class="flex justify-between items-center border-b border-slate-800 pb-3">
          <h3 class="text-sm font-black uppercase tracking-wider text-slate-200">🏸 Badminton Court 1</h3>
          <span class="text-[9px] bg-cyan-950/40 text-cyan-400 border border-cyan-900/40 px-2 py-0.5 rounded-lg font-black">BD-01</span>
        </div>
        <div id="matrixContainer-bd1" class="space-y-3 max-h-[620px] overflow-y-auto"></div>
      </div>
    </div>
  </main>

  <div id="memberDetailModalOverlay" class="hidden fixed inset-0 bg-slate-950/85 backdrop-blur-sm z-[9999] flex items-center justify-center p-4" onclick="closeMemberVerificationModal()">
    <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6 max-w-md w-full space-y-5" onclick="event.stopPropagation()">
      <div class="flex justify-between items-center border-b border-slate-800 pb-3">
        <h3 class="text-sm font-black text-slate-200 uppercase">🛡️ Gate Verification</h3>
        <button onclick="closeMemberVerificationModal()" class="text-slate-500 font-mono text-xs bg-slate-950 px-2 py-1 rounded border border-slate-800">ESC</button>
      </div>
      <div class="space-y-4">
        <div class="bg-slate-950 p-4 rounded-2xl"><span class="text-[9px] uppercase font-black text-slate-500 block">Player</span><p id="modalMemberName" class="text-xl font-black text-white">--</p></div>
        <div class="bg-slate-950 p-4 rounded-2xl"><span class="text-[9px] uppercase font-black text-slate-500 block">Court</span><p id="modalMemberCourt" class="text-sm font-bold text-amber-400">--</p></div>
        <div class="bg-slate-950 p-4 rounded-2xl"><span class="text-[9px] uppercase font-black text-slate-500 block">Time Slot</span><p id="modalMemberSlot" class="text-sm font-mono text-cyan-400">--</p></div>
      </div>
      <button onclick="closeMemberVerificationModal()" class="w-full bg-slate-950 border border-slate-800 text-slate-300 font-bold py-3 rounded-xl text-xs uppercase tracking-widest">Approve & Close</button>
    </div>
  </div>

  <script>
    const TARGET_TIME_SLOTS = ["07:00 - 08:00", "08:00 - 09:00", "09:00 - 10:00", "10:00 - 11:00", "11:00 - 12:00", "12:00 - 13:00", "13:00 - 14:00", "14:00 - 15:00", "15:00 - 16:00", "16:00 - 17:00", "17:00 - 18:00", "18:00 - 19:00", "19:00 - 20:00", "20:00 - 21:00"];
    let cachedServerRecordsMemory = [];

    function getNowLocalIST() { return new Date(new Date().toLocaleString("en-US", { timeZone: "Asia/Kolkata" })); }
    function getTodayFormattedIST() {
      const now = getNowLocalIST();
      return `${String(now.getDate()).padStart(2,'0')}/${String(now.getMonth()+1).padStart(2,'0')}/${now.getFullYear()}`;
    }

    function extractNormalizedAssetToken(name) {
      if(!name) return "";
      let str = name.toString().toLowerCase().trim();
      let prefix = (str.includes("badminton") || str.includes("bd")) ? "bd" : "pb";
      let numbers = str.replace(/[^0-9]/g, '');
      return prefix + (numbers.length > 0 ? numbers.charAt(0) : "1");
    }

    function sanitizeDateString(input) {
      if(!input) return "";
      let str = input.toString().trim();
      if(str.includes('T')) {
          let d = new Date(str);
          if(!isNaN(d.getTime())) {
              let localIST = new Date(d.toLocaleString("en-US", { timeZone: "Asia/Kolkata" }));
              return `${String(localIST.getDate()).padStart(2,'0')}/${String(localIST.getMonth()+1).padStart(2,'0')}/${localIST.getFullYear()}`;
          }
      }
      return str;
    }

    function parseUIDateToAbsoluteObject(dateStr, timeSlotStr) {
      try {
        const [d, m, y] = dateStr.split('/');
        const [startHourStr] = timeSlotStr.split(' - ');
        const [hour, minutes] = startHourStr.split(':');
        return new Date(parseInt(y, 10), parseInt(m, 10) - 1, parseInt(d, 10), parseInt(hour, 10), parseInt(minutes || 0, 10), 0);
      } catch(e) { return new Date(); }
    }

    function executeClockPulse() {
      const now = getNowLocalIST();
      document.getElementById('gateLiveClockStr').innerText = now.toTimeString().split(' ')[0];
      document.getElementById('gateLiveDateStr').innerText = now.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
    }
    setInterval(executeClockPulse, 1000); executeClockPulse();

    function syncGateLogsMatrix() {
      const todayISTStr = getTodayFormattedIST();
      const nowIST = getNowLocalIST();

      fetch('/api/fetch-logs', { method: 'POST' })
        .then(r => r.json())
        .then(res => {
          cachedServerRecordsMemory = res.records || [];
          
          const columns = {
            'pb1': { container: document.getElementById('matrixContainer-pb1'), token: 'pb1' },
            'pb2': { container: document.getElementById('matrixContainer-pb2'), token: 'pb2' },
            'bd1': { container: document.getElementById('matrixContainer-bd1'), token: 'bd1' }
          };

          Object.keys(columns).forEach(key => {
            const currentColumn = columns[key];
            let targetHtml = "";

            const activeSlots = cachedServerRecordsMemory.filter(r => 
              extractNormalizedAssetToken(r.court_name) === currentColumn.token && 
              sanitizeDateString(r.date) === todayISTStr
            );

            TARGET_TIME_SLOTS.forEach(slot => {
              const matchedBooking = activeSlots.find(s => s.time_slot.trim() === slot.trim());
              const isPastSlot = nowIST >= parseUIDateToAbsoluteObject(todayISTStr, slot);

              let cardStyle = "border-slate-800 bg-slate-950 text-slate-400";
              let badgeStyle = "bg-slate-900 text-slate-600 border-slate-800";
              let statusLabel = "OPEN CELL";
              let playerName = "— Available Session —";
              let actionClickHook = "";

              if (isPastSlot) {
                cardStyle = "border-slate-950 bg-slate-950/30 text-slate-700 opacity-40 line-through";
                badgeStyle = "bg-slate-950 text-slate-800 border-transparent";
                statusLabel = "EXPIRED";
                playerName = matchedBooking ? matchedBooking.booked_by : "No Bookings";
              } else if (matchedBooking) {
                statusLabel = "OCCUPIED";
                playerName = matchedBooking.booked_by;
                cardStyle = "border-cyan-500/40 bg-gradient-to-r from-cyan-950/20 to-slate-950 text-slate-200 shadow-md cursor-pointer hover:border-cyan-400 transition-all";
                badgeStyle = "bg-cyan-950 text-cyan-400 border-cyan-800/40 font-black";
                actionClickHook = `onclick="openMemberVerificationModal('${matchedBooking.booking_id}')"`;
              }

              targetHtml += `
                <div ${actionClickHook} class="border p-3 rounded-2xl flex flex-col justify-between items-start space-y-1.5 transition-all ${cardStyle}">
                  <div class="w-full flex justify-between items-center">
                    <span class="text-xs font-mono font-black tracking-wide">${slot}</span>
                    <span class="text-[8px] border px-2 py-0.5 rounded-md font-black tracking-widest uppercase ${badgeStyle}">${statusLabel}</span>
                  </div>
                  <p class="text-sm font-black tracking-tight">${playerName}</p>
                </div>`;
            });
            currentColumn.container.innerHTML = targetHtml;
          });
        });
    }

    function openMemberVerificationModal(bookingId) {
      const match = cachedServerRecordsMemory.find(b => b.booking_id === bookingId);
      if(!match) return;
      document.getElementById('modalMemberName').innerText = match.booked_by;
      document.getElementById('modalMemberCourt').innerText = match.court_name;
      document.getElementById('modalMemberSlot').innerText = match.time_slot;
      document.getElementById('memberDetailModalOverlay').classList.remove('hidden');
    }

    function closeMemberVerificationModal() { document.getElementById('memberDetailModalOverlay').classList.add('hidden'); }

    syncGateLogsMatrix(); setInterval(syncGateLogsMatrix, 3000);
  </script>
</body>
</html>
